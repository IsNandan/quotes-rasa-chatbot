version: "3.1"

rules:
  - rule: respond to greet
    steps:
      - intent: greet
      - action: utter_greet

  - rule: respond to goodbye
    steps:
      - intent: goodbye
      - action: utter_goodbye

  - rule: show categories
    steps:
      - intent: ask_categories
      - action: utter_categories

  - rule: thank you response
    steps:
      - intent: thank_you
      - action: utter_you_are_welcome

  - rule: bot challenge
    steps:
      - intent: bot_challenge
      - action: utter_iamabot

  - rule: fallback
    steps:
      - intent: nlu_fallback
      - action: utter_default

  - rule: category provided directly
    steps:
      - intent: specify_category
      - action: action_get_personalized_quote

  - rule: emotion provided directly
    steps:
      - intent: specify_emotion
      - action: action_get_personalized_quote
